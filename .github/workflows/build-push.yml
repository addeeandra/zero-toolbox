# ------------------------------------------------------------------
# zero-toolbox  --  Build, push, and smoke-test the container image
# ------------------------------------------------------------------
name: Build & Push zero-toolbox

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint the Dockerfile ──────────────────────────────────────
  lint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3009,DL3015 # apt pin / recommends warnings acceptable here

  # ── Build & push multi-arch image ────────────────────────────
  build-push:
    name: Build & Push
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
          labels: |
            org.opencontainers.image.title=zero-toolbox
            org.opencontainers.image.description=Debian toolbox for zeroclaw AI agents

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print digest
        run: |
          echo "Image pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Digest:       ${{ steps.build.outputs.digest }}"

  # ── Smoke-test the built image ───────────────────────────────
  smoke-test:
    name: Smoke Test
    needs: build-push
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image by digest
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.image-digest }}
          docker tag \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.image-digest }} \
            zero-toolbox:smoke

      - name: Verify zeroclaw binary
        run: docker run --rm zero-toolbox:smoke zeroclaw --version || docker run --rm zero-toolbox:smoke zeroclaw status

      - name: Verify system tools
        run: |
          docker run --rm zero-toolbox:smoke sh -c '
            set -e
            echo "--- jq ---"         && jq --version
            echo "--- yq ---"         && yq --version
            echo "--- ripgrep ---"    && rg --version
            echo "--- fd ---"         && fdfind --version
            echo "--- ffmpeg ---"     && ffmpeg -version | head -1
            echo "--- imagemagick ---" && convert --version | head -1
            echo "--- git ---"        && git --version
            echo "--- curl ---"       && curl --version | head -1
            echo "--- tree ---"       && tree --version
          '

      - name: Verify Node.js and npx
        run: |
          docker run --rm zero-toolbox:smoke sh -c '
            set -e
            echo "--- node ---" && node --version
            echo "--- npm ---"  && npm --version
            echo "--- npx ---"  && npx --version
          '

      - name: Verify gh CLI
        run: docker run --rm zero-toolbox:smoke gh --version

      - name: Verify Python packages
        run: |
          docker run --rm zero-toolbox:smoke python3 -c "
          import pypdf;        print(f'pypdf {pypdf.__version__}')
          import docx;         print(f'python-docx {docx.__version__}')
          import openpyxl;     print(f'openpyxl {openpyxl.__version__}')
          import bs4;          print(f'beautifulsoup4 {bs4.__version__}')
          import lxml;         print(f'lxml {lxml.__version__}')
          import markdown;     print(f'markdown {markdown.__version__}')
          import playwright;   print(f'playwright {playwright.__version__}')
          "

      - name: Verify Playwright chromium
        run: |
          docker run --rm zero-toolbox:smoke python3 -c "
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto('data:text/html,<h1>OK</h1>')
              print('Playwright chromium: OK')
              browser.close()
          "

      - name: Verify container user
        run: |
          uid=$(docker run --rm zero-toolbox:smoke id -u)
          echo "Container UID: $uid"
          if [ "$uid" != "65534" ]; then
            echo "ERROR: expected UID 65534, got $uid"
            exit 1
          fi
